<script>
(function(){
  registerAnalysisPlugin({
    id: "recent-form",
    title: "Phong \u0111\u1ed9 g\u1ea7n \u0111\u00e2y",
    icon: "\u25cf",
    order: 10,
    render: render
  });

  function render(container, context){
    const matches = context.matches || [];

    if(!matches.length){
      container.innerHTML = '<div class="analysis-empty">Ch\u01b0a c\u00f3 d\u1eef li\u1ec7u ph\u00e2n t\u00edch cho season n\u00e0y.</div>';
      return;
    }

    const formMap = {};

    (context.allPlayers || context.players || []).forEach(p=>{
      formMap[p.id] = {
        id:p.id,
        name:p.name,
        form:[]
      };
    });

    matches
      .slice()
      .sort((a,b)=>Number(b.dateValue || 0) - Number(a.dateValue || 0))
      .forEach(m=>{
        [m.win1,m.win2].forEach(id=>{
          if(formMap[id] && formMap[id].form.length < 5){
            formMap[id].form.push("W");
          }
        });

        [m.lose1,m.lose2].forEach(id=>{
          if(formMap[id] && formMap[id].form.length < 5){
            formMap[id].form.push("L");
          }
        });
      });

    const arr = Object.values(formMap)
      .filter(x=>x.form.length)
      .sort((a,b)=>b.form.length-a.form.length || a.name.localeCompare(b.name))
      .slice(0,8);

    if(!arr.length){
      container.innerHTML = '<div class="analysis-empty">Ch\u01b0a \u0111\u1ee7 d\u1eef li\u1ec7u.</div>';
      return;
    }

    container.innerHTML = arr.map(p=>{
      const chips = p.form.map(x=>`<span class="analysis-form-chip ${x==='W'?'win':'lose'}">${x}</span>`).join("");
      return `
        <div class="analysis-stats-row plugin-recent-form-row">
          <div class="analysis-stats-name">${escapeHtml(p.name)}</div>
          <div class="analysis-form-line">${chips}</div>
        </div>
      `;
    }).join("");
  }
})();
</script>
