<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#fff;
  padding:14px;
  letter-spacing:0;
  text-rendering:geometricPrecision;
}

.app{max-width:1100px;margin:auto}

.header{text-align:center;margin-bottom:18px}
.header h1{margin:0;font-size:30px}
.header p{margin:6px 0 0;color:#94a3b8}

.card{
  background:rgba(30,41,59,.96);
  border:1px solid #334155;
  border-radius:22px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 12px 30px rgba(0,0,0,.35);
}

.card h3{margin:0 0 14px;font-size:20px}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:720px}

th{
  background:#0f172a;
  color:#cbd5e1;
  padding:12px;
  font-size:14px;
  text-align:center;
  border-bottom:1px solid #334155;
}

td{
  padding:12px;
  text-align:center;
  border-bottom:1px solid #334155;
  font-size:15px;
}

td.name{text-align:left;font-weight:bold}

.ranking-name-btn{
  width:100%;
  min-width:0;
  display:inline-flex;
  align-items:center;
  justify-content:flex-start;
  gap:7px;
  padding:0;
  margin:0;
  border:none;
  border-radius:8px;
  background:transparent;
  color:#f8fafc;
  font:inherit;
  text-align:left;
  cursor:pointer;
}

.ranking-name-btn span:first-child{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.ranking-name-btn:hover,
.ranking-name-btn:active{
  color:#facc15;
}

.ranking-expand-icon{
  flex:0 0 auto;
  color:#94a3b8;
  font-size:10px;
}

.ranking-detail-row td{
  padding:0 12px 12px;
  background:#0b1220;
  border-bottom:1px solid #334155;
}

.ranking-detail-shell{
  overflow:hidden;
  animation:rankingDetailOpen .18s ease-out;
  background:linear-gradient(180deg,rgba(15,23,42,.98),rgba(2,6,23,.96));
  border:1px solid rgba(51,65,85,.9);
  border-radius:12px;
  padding:10px 12px;
  text-align:left;
}

.ranking-detail-line{
  min-width:0;
  color:#cbd5e1;
  font-size:13px;
  line-height:1.45;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.ranking-detail-line + .ranking-detail-line{
  margin-top:4px;
}

.ranking-detail-line span{
  color:#f8fafc;
  font-weight:800;
}

.ranking-detail-form{
  display:flex;
  align-items:center;
  gap:10px;
}

.ranking-form-strip{
  display:inline-flex;
  align-items:center;
  gap:7px;
  margin-left:4px;
  vertical-align:middle;
}

.ranking-form-pill{
  width:24px;
  height:24px;
  border-radius:999px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:900;
  color:#fff;
}

.ranking-form-pill.win{
  background:#16a34a;
}

.ranking-form-pill.lose{
  background:#dc2626;
}

@keyframes rankingDetailOpen{
  from{
    opacity:0;
    transform:translateY(-4px);
    max-height:0;
  }
  to{
    opacity:1;
    transform:translateY(0);
    max-height:180px;
  }
}

.rank{font-size:18px;font-weight:bold}
.top1{color:#facc15}
.top2{color:#e5e7eb}
.top3{color:#fb923c}

.money{color:#f87171;font-weight:bold}
.rate{color:#22c55e;font-weight:bold}

.match-layout{
  display:grid;
  grid-template-columns:1fr 160px 1fr;
  gap:14px;
  align-items:stretch;
}

.team-box{
  background:#0f172a;
  border:1px solid #334155;
  border-radius:18px;
  padding:14px;
}

.team-title{
  font-weight:bold;
  text-align:center;
  margin-bottom:10px;
  font-size:16px;
}

.win-title{color:#22c55e}
.lose-title{color:#f87171}

.score-box{
  background:#020617;
  border:1px solid #334155;
  border-radius:18px;
  padding:14px;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.score-title{
  color:#cbd5e1;
  font-size:13px;
  margin-bottom:8px;
}

.score-inputs{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.score-inputs input{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  padding:10px;
}

.vs{font-weight:bold;color:#94a3b8}

label{
  display:block;
  font-size:13px;
  color:#cbd5e1;
  margin:10px 0 6px;
}

select,input{
  width:100%;
  padding:13px;
  border:none;
  border-radius:14px;
  font-size:16px;
  background:#f8fafc;
  color:#020617;
}

select{min-height:48px}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  font-weight:bold;
  font-size:17px;
  margin-top:14px;
}

button:disabled{
  background:#64748b;
  cursor:not-allowed;
  opacity:.8;
}

.note{
  color:#94a3b8;
  font-size:13px;
  margin-top:8px;
  text-align:center;
}

@media(max-width:760px){
  body{padding:10px}
  .header h1{font-size:24px}
  .card{padding:13px;border-radius:18px}
  .card h3{font-size:18px}

  .match-layout{
    grid-template-columns:1fr;
    gap:8px;
  }

  .score-box{order:2}
  .team-box.win{order:1}
  .team-box.lose{order:3}
  .team-box,
  .score-box{
    border-radius:14px;
    padding:11px;
  }
  .team-title{
    margin-bottom:6px;
    font-size:14px;
  }
  label{
    margin:7px 0 5px;
    font-size:12px;
  }
  select{
    min-height:46px;
    padding:11px 12px;
  }

  .table-wrap{overflow-x:visible}
  table{min-width:0;table-layout:fixed}
  th,td{padding:9px 6px;font-size:13px}
  th:nth-child(1),td:nth-child(1){width:42px}
  th:nth-child(2),td:nth-child(2){width:auto}
  th:nth-child(3),td:nth-child(3){width:48px}
  th:nth-child(4),td:nth-child(4),
  th:nth-child(5),td:nth-child(5),
  th:nth-child(7),td:nth-child(7){display:none}
  th:nth-child(6),td:nth-child(6){width:62px}
  td.name{font-size:14px}
  .ranking-name-btn{gap:5px}

  .ranking-detail-row td{
    display:table-cell;
    padding:0 10px 10px;
  }

  .ranking-detail-shell{
    padding:9px 10px;
  }

  .ranking-detail-line{
    font-size:12px;
    white-space:normal;
  }

  .ranking-detail-form{
    align-items:flex-start;
    flex-wrap:wrap;
    gap:7px;
  }

  .ranking-form-strip{
    gap:6px;
    margin-left:0;
  }

  .ranking-form-pill{
    width:22px;
    height:22px;
    font-size:11px;
  }

  select,input,button{
    font-size:16px;
    padding:13px;
  }
}
.read-only-mode .edit-only,
.read-only-mode #settingsModal,
.read-only-mode #playerModal,
.read-only-mode #seasonManageModal,
.read-only-mode #moneyModal,
.read-only-mode .fab-setting,
.read-only-mode .delete-btn,
.read-only-mode .recent-delete-btn,
.read-only-mode .season-action-btn,
.read-only-mode .setting-save-btn{
  display:none!important;
}

</style>
